<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Registration</h2>

    <form id="registerForm">
        <input type="email" id="email" placeholder="Mail" required><br><br>
        <input type="text" id="login" placeholder="Login" required><br><br>
        <input type="password" id="pass1" placeholder="Password" required><br><br>
        <input type="password" id="pass2" placeholder="Repeat password" required><br><br>

        <button type="submit">Register</button>

    </form>

    <p id="result"></p>

    <script src="script.js"></script>
</body>

</html>
